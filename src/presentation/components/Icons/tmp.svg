<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 120 30"
  width="120"
  height="30"
  fill="none"
>
  <defs>
    <!-- Single gear tooth (centered at origin, pointing right) -->
    <rect id="tooth" x="-1" y="-0.75" width="2" height="1.5" rx="0.5" fill="#1E3A8A" />
  </defs>

  <!-- Gear body – a filled circle that becomes the 'C' shape after the gap -->
  <circle cx="15" cy="15" r="9" fill="#1E3A8A" />

  <!-- Teeth placed around the circumference, skipping the gap sector (20° to 160°) -->
  <!-- 0° -->
  <!-- <use href="#tooth" transform="translate(15,15) rotate(0) translate(10.5,0)" /> -->
  <!-- 30° -->
  <!-- <use href="#tooth" transform="translate(15,15) rotate(30) translate(10.5,0)" /> -->
  <!-- 60° -->
  <use href="#tooth" transform="translate(15,15) rotate(60) translate(10.5,0)" />
  <!-- 90° skipped (gap start) -->
  <use href="#tooth" transform="translate(15,15) rotate(90) translate(10.5,0)" />
  <!-- 120° skipped -->
  <use href="#tooth" transform="translate(15,15) rotate(120) translate(10.5,0)" />
  <!-- 150° skipped -->
  <use href="#tooth" transform="translate(15,15) rotate(150) translate(10.5,0)" />
  <!-- 180° (gap end, left side) -->
  <use href="#tooth" transform="translate(15,15) rotate(180) translate(10.5,0)" />
  <!-- 210° -->
  <use href="#tooth" transform="translate(15,15) rotate(210) translate(10.5,0)" />
  <!-- 240° -->
  <use href="#tooth" transform="translate(15,15) rotate(240) translate(10.5,0)" />
  <!-- 270° -->
  <use href="#tooth" transform="translate(15,15) rotate(270) translate(10.5,0)" />
  <!-- 300° -->
  <use href="#tooth" transform="translate(15,15) rotate(300) translate(10.5,0)" />
  <!-- 330° -->
  <!-- <use href="#tooth" transform="translate(15,15) rotate(330) translate(10.5,0)" /> -->

  <!-- Cut out the gap to form the letter C – a white circle on top of the right area -->
  <!-- A sector mask would be cleaner, but simple approach: a white circle slightly offset -->
  <!-- Instead, draw a white wedge shape as a polygon to erase the gap -->
  <!-- <path
    d="M15,15 L26.07,4.93 A11,11 0 0,0 3.93,4.93 Z"
    fill="#FFFFFF"
  /> -->
  <!-- Adjust to exactly cover the 90°-150° gap: a sector from 20° to 160° with radius 11 -->
  <!-- Let's compute points: start at 20°: x=15+11*cos(20)=25.33, y=15+11*sin(20)=18.76 -->
  <!-- end at 160°: x=15+11*cos(160)=4.66, y=15+11*sin(160)=18.76 -->
  <!-- that's too complex. I'll use a polygon that simply covers the right arc -->
  <!-- Actually the previous approach works but the white wedge must exactly match the gap I want. I'll define a clean path: -->
  <!-- <path
    d="M15,15 L25.33,18.76 A11,11 0 0,1 4.66,18.76 Z"
    fill="#FFFFFF"
  /> -->

  <!-- Inner hole of the gear (to make it look like a ring) -->
  <circle cx="15" cy="15" r="5.5" fill="#FFFFFF" />

  <!-- Green checkmark inside the gap area – IMS symbol (verified asset) -->
  <polyline
    points="12.5,15 15,17 19,12"
    stroke="#10B981"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Wordmark "AMS" (tech monospace) aligned with the gear -->
  <text
    x="30"
    y="20.5"
    font-family="'Courier New', Courier, monospace"
    font-weight="900"
    font-size="17"
    fill="#1E3A8A"
    letter-spacing="0.5"
  >
    AMS
  </text>

  <!-- Small tag accent under the text (instead of barcode underline) -->
  <line
    x1="27"
    y1="25"
    x2="65"
    y2="25"
    stroke="#10B981"
    stroke-width="2.5"
    stroke-dasharray="5 3"
    stroke-linecap="round"
  />
</svg>